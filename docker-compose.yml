services:
  postgres:
    image: postgres:16-alpine
    container_name: smartspend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartspend
      POSTGRES_PASSWORD: smartspend
      POSTGRES_DB: smartspend
    ports:
      - "5432:5432"
    volumes:
      - smartspend_pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartspend -d smartspend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  smartspend_pgdata:
    driver: local
